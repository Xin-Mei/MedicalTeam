<title>金鶯診所 - 醫師個人班表</title>
<style>
:root{
  color-scheme: light;
  --teal:#2f9183; --teal-dark:#237468; --green:#3c6e58; --gold:#b3925f;
  --ink:#3a4a44; --muted:#8a9690; --card:#fff; --line:#ece3d2; --chip:#f6efe4;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
  color:var(--ink);min-height:100vh;
  background:radial-gradient(1200px 380px at 15% -8%,#e7f0e8 0%,rgba(231,240,232,0) 60%),
    radial-gradient(1200px 380px at 100% -5%,#eef2e6 0%,rgba(238,242,230,0) 55%),
    linear-gradient(180deg,#fbf7ee 0%,#f7f2e7 100%);background-attachment:fixed;}
.wrap{max-width:1040px;margin:0 auto;padding:20px 18px 50px;}

.brand{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px;position:relative;min-height:44px;}
.brand .logo-img{height:58px;width:auto;display:block;}
.brand-fallback{display:flex;align-items:center;gap:13px;}
.logo-fallback{width:50px;height:50px;border-radius:50%;flex:none;display:flex;
  background:radial-gradient(circle at 35% 30%,#4bb6a4,var(--teal-dark));align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(47,145,131,.3);}
.logo-fallback svg{width:28px;height:28px;}
.brand .txt .name{font-size:20px;font-weight:700;color:var(--green);letter-spacing:1px;line-height:1.15;}
.brand .txt .org{font-size:12px;color:var(--gold);letter-spacing:2px;margin-top:3px;}
.brand .admin-link{position:absolute;right:0;top:50%;transform:translateY(-50%);
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;color:var(--muted);background:none;border:1px solid var(--line);
  border-radius:50%;cursor:pointer;padding:0;transition:color .15s,border-color .15s;}
.brand .admin-link svg{width:21px;height:21px;transition:transform .2s;}
.brand .admin-link:hover{color:var(--teal-dark);border-color:var(--teal);}
.brand .admin-link:hover svg{transform:rotate(45deg);}

.hero{text-align:center;margin:8px 0 22px;}
.hero .eyebrow{font-size:12px;letter-spacing:6px;color:var(--gold);font-weight:600;margin-top:7px;}
.hero h1{margin:0;font-size:30px;color:var(--green);letter-spacing:4px;font-weight:700;}
.hero .divider{width:56px;height:3px;background:var(--teal);border-radius:2px;margin:14px auto 12px;}
.hero p{margin:0;color:var(--muted);font-size:13.5px;}

.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;
  box-shadow:0 8px 26px rgba(120,100,60,.07);padding:15px 18px;margin-bottom:14px;}
.panel-row{display:flex;align-items:flex-start;gap:14px;}
.panel-label{flex:none;display:inline-flex;align-items:center;gap:6px;background:var(--chip);
  color:var(--gold);font-size:13px;font-weight:700;padding:7px 13px;border-radius:999px;margin-top:2px;}
.capsules{display:flex;flex-wrap:wrap;gap:9px;flex:1;}
.capsule{border:1px solid #ddd2bd;background:#fff;color:#5b6862;border-radius:999px;
  padding:8px 16px;font-size:14px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.capsule:hover{border-color:var(--teal);color:var(--teal-dark);}
.capsule.active{background:#79bdb0;border-color:#79bdb0;color:#fff;font-weight:600;box-shadow:0 4px 12px rgba(121,189,176,.32);}
.capsule.all.active{background:#79bdb0;border-color:#79bdb0;}
.cap-scroll{display:none;height:5px;background:#ece3d2;border-radius:3px;margin:10px 2px 0;}
.cap-thumb{height:100%;width:30%;background:var(--teal);border-radius:3px;}

.syncbar{display:none;align-items:center;gap:10px;margin:0 4px 20px;font-size:12.5px;color:var(--muted);}
.resync{background:none;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12.5px;color:var(--teal-dark);cursor:pointer;}
.resync:hover{border-color:var(--teal);}

.clinic-box{background:var(--card);border:1px solid var(--line);border-radius:18px;
  box-shadow:0 6px 18px rgba(120,100,60,.06);padding:18px 18px 20px;margin-bottom:18px;}
.clinic-head{display:flex;align-items:flex-end;gap:10px;margin-bottom:16px;}
.clinic-title-wrap{display:inline-flex;align-items:center;gap:9px;padding-bottom:8px;border-bottom:2.5px solid var(--teal);color:var(--teal);}
.clinic-title-wrap svg{width:22px;height:22px;flex:none;}
.clinic-title{font-size:18px;font-weight:700;color:#33473e;}
.clinic-count{font-size:12px;color:var(--muted);background:#eef5f2;border-radius:999px;padding:2px 10px;margin-bottom:9px;}
.doc-grid{display:flex;flex-wrap:wrap;gap:10px;}
.doc-btn{border:1px solid #ddd2bd;background:#fff;color:#5b6862;border-radius:999px;
  padding:9px 18px;font-size:15px;cursor:pointer;transition:all .15s;font-weight:600;}
.doc-btn:hover{border-color:#79bdb0;color:var(--teal-dark);background:#fff;}
.doc-btn.unset{border-style:dashed;border-color:#dcd8cd;color:#aeb6af;background:#faf9f5;}
.doc-btn.unset:hover{border-color:#dcd8cd;color:#aeb6af;}

.footer{text-align:center;color:var(--muted);font-size:12.5px;margin-top:30px;line-height:1.9;}
.footer .ft-title{color:var(--green);font-weight:700;font-size:13.5px;margin-bottom:4px;}
.footer a{color:var(--teal-dark);}

/* ===== admin ===== */
.overlay{position:fixed;inset:0;background:rgba(40,55,50,.55);display:none;align-items:flex-start;
  justify-content:center;padding:24px 12px;overflow-y:auto;z-index:60;}
.overlay.show{display:flex;}
.admin{background:#fff;border-radius:18px;max-width:860px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.32);overflow:hidden;}
.admin-head{display:flex;align-items:center;gap:12px;padding:18px 20px;background:linear-gradient(180deg,#f3f8f4,#fff);border-bottom:1px solid var(--line);}
.admin-head h2{margin:0;font-size:19px;color:var(--green);}
.admin-head .x{margin-left:auto;background:#f1efe7;border:none;border-radius:9px;width:34px;height:34px;font-size:19px;cursor:pointer;color:#6b7770;}
.admin-body{padding:18px 20px;max-height:72vh;overflow-y:auto;}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.btn{border:none;border-radius:10px;padding:9px 16px;font-size:14px;cursor:pointer;font-weight:600;}
.btn.primary{background:var(--teal);color:#fff;}
.btn.primary:hover{background:var(--teal-dark);}
.btn.ghost{background:#f1efe7;color:#5b6862;}
.btn.ghost:hover{background:#e6e2d6;}
.hint{font-size:12px;color:var(--muted);margin:-4px 0 14px;line-height:1.6;}
.adm-clinic{border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.adm-clinic>summary{cursor:pointer;padding:11px 14px;background:#f7f4ec;font-weight:700;color:var(--green);list-style:none;display:flex;align-items:center;gap:8px;}
.adm-clinic>summary::-webkit-details-marker{display:none;}
.adm-clinic>summary .cnt{font-size:12px;color:var(--muted);font-weight:500;}
.adm-rows{padding:12px 14px;}
.adm-src{display:flex;gap:8px;align-items:center;margin-bottom:10px;font-size:12px;color:var(--muted);}
.adm-src input{flex:1;border:1px solid #e4dcc9;border-radius:8px;padding:6px 9px;font-size:12px;font-family:inherit;color:#7a857f;}
.adm-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.adm-row input{flex:1;border:1px solid #d9d0bd;border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;}
.adm-row input.name{flex:0 0 150px;}
.adm-row .mv{display:flex;flex-direction:column;gap:2px;flex:none;}
.adm-row .mv button{background:#eef1ec;border:none;border-radius:5px;width:26px;height:16px;line-height:1;font-size:9px;cursor:pointer;color:#6b7770;padding:0;}
.adm-row .mv button:hover{background:#d8e6e0;color:var(--teal-dark);}
.adm-row .mv button:disabled{opacity:.3;cursor:default;}
.adm-row .del{background:#fbeceb;color:#c0594f;border:none;border-radius:8px;width:32px;height:34px;cursor:pointer;font-size:16px;flex:none;}
.adm-row .apply{background:#eef5f2;color:var(--teal-dark);border:none;border-radius:8px;padding:0 10px;height:34px;cursor:pointer;font-size:12px;flex:none;white-space:nowrap;}
.adm-add{background:none;border:1px dashed #cdd4cf;color:var(--teal-dark);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;}
.settings{border-top:1px solid var(--line);padding-top:14px;margin-top:6px;}
.settings label{font-size:13px;color:var(--ink);display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.settings input[type=text]{border:1px solid #d9d0bd;border-radius:8px;padding:7px 10px;font-size:14px;font-family:inherit;}
.gate{padding:26px 20px;text-align:center;}
.gate input{border:1px solid #d9d0bd;border-radius:10px;padding:10px 14px;font-size:15px;font-family:inherit;width:220px;text-align:center;}
.gate p{color:var(--muted);font-size:13px;}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;
  padding:11px 22px;border-radius:999px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;
  transition:opacity .25s;z-index:80;pointer-events:none;}
.toast.show{opacity:1;}

/* 手機版：院區篩選改單行可橫向滑動，避免院區增加時越拉越長 */
@media (max-width:600px){
  .wrap{padding:16px 14px 40px;}
  .brand .logo-img{height:46px;}
  .hero h1{font-size:25px;letter-spacing:2px;}
  .hero p{font-size:12.5px;padding:0 6px;}
  .panel{padding:13px 14px;}
  .panel-row{flex-direction:column;gap:9px;}
  .panel-label{margin-top:0;align-self:flex-start;}
  .capsules{width:100%;min-width:0;flex:1 1 auto;flex-wrap:nowrap;overflow-x:auto;
    -webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;scrollbar-width:none;}
  .capsules::-webkit-scrollbar{display:none;}
  .capsule{flex:0 0 auto;padding:8px 14px;font-size:13.5px;scroll-snap-align:start;}
  .clinic-box{padding:16px 14px 18px;}
  .doc-grid{gap:8px;}
  .doc-btn{font-size:14px;padding:8px 15px;}
}

const LS_KEY = "drking_team_config_v3";
let CONFIG = loadConfig();
let current = "all"; // "all"=全院區醫師，或院區索引

function loadConfig(){
  // 只有當本機暫存的版本與線上檔版本相同時才沿用，否則一律採用線上檔(baked)，
  // 確保上傳新檔後所有裝置看到的順序一致、不被舊的本機暫存蓋掉。
  try{ const s=localStorage.getItem(LS_KEY); if(s){ const c=JSON.parse(s);
    if(c&&c.clinics && c.configVersion===DEFAULT_CONFIG.configVersion) return c; } }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
}
function saveDraft(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(CONFIG)); }catch(e){} }

function updateCapScroll(){
  const cap=document.getElementById("capsules");
  const track=document.getElementById("capScroll");
  const thumb=document.getElementById("capThumb");
  if(!cap||!track||!thumb) return;
  const sw=cap.scrollWidth, cw=cap.clientWidth;
  if(sw<=cw+4){ track.style.display="none"; return; }   // 沒有溢出(桌機換行)就不顯示
  track.style.display="block";
  const ratio=cw/sw;
  const thumbW=Math.max(14, ratio*100);
  thumb.style.width=thumbW+"%";
  const maxScroll=sw-cw;
  const pos=maxScroll>0?(cap.scrollLeft/maxScroll):0;
  thumb.style.marginLeft=(pos*(100-thumbW))+"%";
}

  const cap=document.getElementById("capsules");

/* ---------- 即時同步官網名單 ---------- */
function setSyncStatus(state, extra){
  const el=document.getElementById("syncStatus");
  if(state==="syncing") el.textContent="🔄 正在同步官網最新名單…";
  else if(state==="ok") el.textContent="✓ 已同步官網最新名單"+(extra?("（"+extra+"）"):"");
  else if(state==="fail") el.textContent="⚠ 暫時無法連線官網，顯示內建名單";
  else el.textContent="";
}
function proxify(url){
  const p=CONFIG.proxy||"https://api.allorigins.win/raw?url=";
  return p+encodeURIComponent(url);
}
async function fetchHTML(url){
  const r=await fetch(proxify(url), {cache:"no-store"});
  if(!r.ok) throw new Error("HTTP "+r.status);
  return await r.text();
}
function parseDoctorsFromHTML(html){
  const doc=new DOMParser().parseFromString(html,"text/html");
  const order=[]; const map=new Map();
  doc.querySelectorAll("a[href]").forEach(a=>{
    const href=a.getAttribute("href")||"";
    if(/products-/.test(href)) return;               // 排除院區選單(複數 products-)
    const m=href.match(/product-(\d+(?:-\d+)?)\.html/); // 醫師個人頁(單數 product-)
    if(!m) return;
    const abs="https://www.drking.com.tw/product-"+m[1]+".html";
    let txt=(a.textContent||"").replace(/\s+/g,"");
    if(!map.has(abs)){ map.set(abs,""); order.push(abs); }
    if(txt && txt.toLowerCase()!=="more" && /[一-鿿]/.test(txt)) map.set(abs, txt);
  });
  const out=[];
  order.forEach(href=>{ const name=map.get(href); if(name) out.push({name, url:href}); });
  return out;
}
function mergeClinic(c, live){
  // 保留後台排好的順序：既有醫師依原順序留下(仍在官網者)，官網新增者補在最後
  const liveByName=new Map(live.map(d=>[d.name, d]));
  const kept=new Set();
  const result=[];
  (c.doctors||[]).forEach(d=>{
    if(liveByName.has(d.name)){
      if(!d.url) d.url=liveByName.get(d.name).url; // 補上官網連結
      result.push(d); kept.add(d.name);
    }
  });
  live.forEach(ld=>{ if(!kept.has(ld.name)) result.push({name:ld.name, url:ld.url}); });
  c.doctors = result;
}
let syncing=false;
async function liveSync(manual){
  if(syncing) return;
  if(!manual && CONFIG.autoSync===false) { setSyncStatus("idle"); return; }
  syncing=true; setSyncStatus("syncing");
  let ok=0, fail=0;
  for(const c of CONFIG.clinics){
    if(!c.src) continue;
    try{
      const docs=parseDoctorsFromHTML(await fetchHTML(c.src));
      if(docs.length){ mergeClinic(c, docs); ok++; }
      else fail++;
    }catch(e){ fail++; }
  }
  syncing=false;
  if(ok){ renderFront(); setSyncStatus("ok", new Date().toLocaleString("zh-TW",{hour12:false})); }
  else setSyncStatus("fail");
}
function mergeFromClinics(list){
  list.forEach(jc=>{
    if(!jc || !jc.doctors) return;
    let c=CONFIG.clinics.find(x=>x.name===jc.name);
    if(!c){ c={name:jc.name, src:jc.src||"", doctors:[]}; CONFIG.clinics.push(c); }
    mergeClinic(c, jc.doctors);
  });
}
/* 同步：優先讀同源 doctors.json（由 GitHub Action 定時產生，最穩定），失敗再退回中繼即時抓 */
async function syncFromData(manual){
  if(!manual && CONFIG.autoSync===false){ setSyncStatus("idle"); return; }
  setSyncStatus("syncing");
  try{
    const r=await fetch((CONFIG.dataUrl||"doctors.json")+"?t="+Date.now(), {cache:"no-store"});
    if(r.ok){
      const data=await r.json();
      if(data && Array.isArray(data.clinics) && data.clinics.length){
        mergeFromClinics(data.clinics); renderFront();
        const when=data.generatedAt?new Date(data.generatedAt).toLocaleString("zh-TW",{hour12:false}):new Date().toLocaleString("zh-TW",{hour12:false});
        setSyncStatus("ok", when); return;
      }
    }
  }catch(e){}
  // 沒有 doctors.json（或讀取失敗）→ 退回中繼即時抓
  await liveSync(manual);
}

function moveDoctor(c, di, dir){
  const ni=di+dir;
  if(ni<0 || ni>=c.doctors.length) return;
  const t=c.doctors[di]; c.doctors[di]=c.doctors[ni]; c.doctors[ni]=t;
  saveDraft(); renderAdmin(); renderFront();
}

/* ---------- 匯出 ---------- */
function exportSite(){
  CONFIG.configVersion=Date.now();   // 每次匯出視為新版本，上傳後各裝置會自動採用此新順序
  saveDraft();
  document.getElementById("content").innerHTML="";
  document.getElementById("adminBody").innerHTML="";
  document.getElementById("capsules").innerHTML="";
  let html="<!DOCTYPE html>\n"+document.documentElement.outerHTML;
  const json=JSON.stringify(CONFIG,null,2);
  html=html.replace(/\/\*CFG_START\*\/[\s\S]*?\/\*CFG_END\*\//,"/*CFG_START*/"+json+"/*CFG_END*/");
  download(html,"index.html","text/html");
  renderAdmin();
  toast("已下載 doctor-schedule.html，請上傳取代線上檔案");
}
function exportJson(){ download(JSON.stringify(CONFIG,null,2),"config.json","application/json"); toast("已下載 config.json"); }
function importJson(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f)return; const r=new FileReader();
    r.onload=()=>{ try{ const c=JSON.parse(r.result); if(!c.clinics) throw 0; CONFIG=c; saveDraft(); renderAdmin(); renderFront(); toast("已匯入設定"); }catch(e){ toast("檔案格式不正確"); } };
    r.readAsText(f); };
  inp.click();
}
function download(text,name,mime){
  const blob=new Blob([text],{type:mime+";charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}

/* ---------- utils ---------- */
function escHtml(s){ return String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }
function escAttr(s){ return String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m])); }
let toastTimer;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200); }

/* logo：優先用同目錄 logo.png，其次官網logo，最後內建徽記 */
(function(){
  const cands=["logo.png","https://www.drking.com.tw/uploads/use/20250731111412d249.jpg"];
  const img=document.getElementById("logoImg"); let i=0;
  function next(){ if(i>=cands.length){ img.style.display="none"; document.getElementById("logoFb").style.display="flex"; return; } img.src=cands[i++]; }
  img.onerror=next; next();

/* 確保載入時「後台維護」視窗為關閉狀態（防止任何快取/狀態造成自動跳出） */
(function(){
  const o=document.getElementById("adminOverlay"); if(o) o.classList.remove("show");
  const g=document.getElementById("gate"); if(g) g.style.display="block";
  const ab=document.getElementById("adminBody"); if(ab) ab.style.display="none";
})();
renderFront();
syncFromData(false);
</script>
